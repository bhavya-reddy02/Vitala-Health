# Brings up the whole backend with one command:  docker compose up --build
#
#   db    -> PostgreSQL  (user & health data)   :5432
#   redis -> Redis       (sessions & leaderboard):6379
#   api   -> FastAPI                             :8000  (docs at /docs)

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vitala
      POSTGRES_PASSWORD: vitala_pw
      POSTGRES_DB: vitala
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitala -d vitala"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://vitala:vitala_pw@db:5432/vitala
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-change-me
      JWT_EXPIRE_MINUTES: "10080"
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000"
      # Phase 2 — the assistant. Default provider is Hugging Face.
      #   Put your key in a .env file next to this one:  HUGGINGFACEHUB_API_TOKEN=hf_...
      # To switch, set LLM_PROVIDER to gemini, anthropic, or ollama in .env.
      LLM_PROVIDER: ${LLM_PROVIDER:-huggingface}
      # Gemini — put your key in a .env file next to this one:  GOOGLE_API_KEY=...
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_MODEL: gemini-3.5-flash
      # Anthropic (Claude)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CHAT_MODEL: ${CHAT_MODEL:-claude-3-5-sonnet-20241022}
      # Ollama (local)
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2
      # Hugging Face
      HUGGINGFACEHUB_API_TOKEN: ${HUGGINGFACEHUB_API_TOKEN:-}
      HUGGINGFACE_MODEL: ${HUGGINGFACE_MODEL:-Qwen/Qwen2.5-72B-Instruct}
      CHROMA_DIR: /data/chroma
      EMBED_MODEL: BAAI/bge-small-en-v1.5
      ANONYMIZED_TELEMETRY: "False"
    ports:
      - "8000:8000"
    volumes:
      - chroma:/data/chroma          # persisted vector index
      - modelcache:/root/.cache      # cached embedding model (downloaded once)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]           # only starts with:  docker compose --profile ollama up
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama       # downloaded models persist here
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata:
  chroma:
  modelcache:
  ollama:
